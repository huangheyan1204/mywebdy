<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>高等数学互动教学：偏导数 ∂z/∂y 的几何意义 | 曲面切片与切线</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Microsoft YaHei', 'Segoe UI', 'Roboto', sans-serif; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0,0,0,0.75);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            backdrop-filter: blur(8px);
            pointer-events: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border-left: 5px solid #33ff99;
            font-size: 14px;
        }
        #controls {
            position: absolute;
            bottom: 25px;
            left: 25px;
            right: 25px;
            background: rgba(30,30,40,0.9);
            backdrop-filter: blur(10px);
            padding: 20px 30px;
            border-radius: 16px;
            color: white;
            z-index: 100;
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            font-weight: 500;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            pointer-events: auto;
            font-size: 16px;
        }
        .control-group {
            flex: 1;
            min-width: 180px;
        }
        .control-group label {
            display: block;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .control-group span {
            color: #ffaa66;
            font-weight: bold;
        }
        input {
            width: 100%;
            cursor: pointer;
            background: #3a6ea5;
            height: 4px;
            border-radius: 5px;
        }
        .formula {
            font-family: monospace;
            font-size: 18px;
            background: #000000aa;
            padding: 5px 12px;
            border-radius: 40px;
            letter-spacing: 1px;
        }
        @media (max-width: 700px) {
            .control-group { font-size: 12px; }
            .formula { font-size: 12px; }
        }
        .note {
            font-size: 12px;
            color: #ccc;
            text-align: right;
        }
        .highlight {
            color: #33ff99;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="info">
        🧠 <strong>偏导数 ∂z/∂y 的几何意义</strong> ：固定 x = <span id="xValDisplay">0.0</span> ，曲面交得一条曲线，<br>
        该曲线上点 y = <span id="yPointDisplay">0.0</span> 处的切线斜率 = ∂z/∂y = <span id="slopeDisplay" style="color:#33ff99;">0.00</span> &nbsp;&nbsp; | &nbsp; 函数: z = x² − y²
    </div>
    <div id="controls">
        <div class="control-group">
            <label>📐 切片位置 (固定 x): <span id="xSliceVal">0.00</span></label>
            <input type="range" id="xSlice" min="-1.8" max="1.8" step="0.01" value="1.0">
        </div>
        <div class="control-group">
            <label>📍 切点位置 (y₀): <span id="yPointSliderVal">0.00</span></label>
            <input type="range" id="yPoint" min="-1.8" max="1.8" step="0.01" value="0.8">
        </div>
        <div class="formula">
            ∂z/∂y = -2y₀ = <span id="derivativeVal">0.00</span>
        </div>
        <div class="note">
            🖱️ 鼠标拖拽旋转视角 | 滚动缩放 | 展示固定 x 后沿 y 方向的切线
        </div>
    </div>

    <!-- 引入 Three.js 核心库及扩展 -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- 初始化场景、相机、渲染器 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b1a);
        scene.fog = new THREE.FogExp2(0x050b1a, 0.012);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(3.8, 2.5, 4.2);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        // --- 控制器 ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.zoomSpeed = 1.2;
        controls.rotateSpeed = 1.0;
        controls.target.set(0, 0, 0);

        // --- 辅助元素: 网格地面、坐标轴、灯光 ---
        const gridHelper = new THREE.GridHelper(8, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -2.2;
        scene.add(gridHelper);
        
        const axesHelper = new THREE.AxesHelper(3);
        scene.add(axesHelper);
        
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(2, 5, 3);
        scene.add(dirLight);
        const backLight = new THREE.PointLight(0x4466cc, 0.3);
        backLight.position.set(-2, 1, -3);
        scene.add(backLight);
        
        // --- 曲面: z = x^2 - y^2 (马鞍面) ---
        const size = 3.6;   // 范围 [-1.8, 1.8]
        const segments = 72;
        const vertices = [];
        const indices = [];
        const normals = [];
        
        const start = -size/2;
        const step = size / segments;
        
        // 存储网格点
        const gridPoints = [];
        for (let i = 0; i <= segments; i++) {
            const x = start + i * step;
            gridPoints[i] = [];
            for (let j = 0; j <= segments; j++) {
                const y = start + j * step;
                const z = x*x - y*y;
                vertices.push(x, y, z);
                // 法线计算 (数值梯度)
                const eps = 0.05;
                const dzdx = ((x+eps)*(x+eps) - y*y - ((x-eps)*(x-eps) - y*y)) / (2*eps);
                const dzdy = (x*x - (y+eps)*(y+eps) - (x*x - (y-eps)*(y-eps))) / (2*eps);
                const nx = -dzdx;
                const ny = -dzdy;
                const nz = 1;
                const len = Math.hypot(nx, ny, nz);
                normals.push(nx/len, ny/len, nz/len);
                gridPoints[i][j] = { x, y, z };
            }
        }
        
        // 构建索引
        for (let i = 0; i < segments; i++) {
            for (let j = 0; j < segments; j++) {
                const a = i * (segments+1) + j;
                const b = (i+1) * (segments+1) + j;
                const c = (i+1) * (segments+1) + (j+1);
                const d = i * (segments+1) + (j+1);
                indices.push(a, b, c);
                indices.push(a, c, d);
            }
        }
        
        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(vertices), 3));
        geometry.setAttribute('normal', new THREE.BufferAttribute(new Float32Array(normals), 3));
        geometry.setIndex(indices);
        
        const material = new THREE.MeshPhongMaterial({
            color: 0x3a86ff,
            side: THREE.DoubleSide,
            emissive: 0x001133,
            shininess: 60,
            transparent: true,
            opacity: 0.7
        });
        const surfaceMesh = new THREE.Mesh(geometry, material);
        scene.add(surfaceMesh);
        
        // 边缘线框
        const edgesGeo = new THREE.EdgesGeometry(geometry);
        const edgesMat = new THREE.LineBasicMaterial({ color: 0x88bbff });
        const wireframe = new THREE.LineSegments(edgesGeo, edgesMat);
        scene.add(wireframe);
        
        // --- 用于动态更新的对象: 切片平面 (固定 x = x0), 截线 (沿 y 方向), 切线 (沿 y 方向) ---
        let slicePlaneMesh = null;      // 平面 x = x0
        let intersectionCurve = null;   // 截线: 参数 (x0, y, x0^2 - y^2)
        let tangentLineObj = null;      // 切线: 在 (x0, y0) 处，沿 y 方向斜率 ∂z/∂y = -2y0
        let markerPoint = null;
        
        // 辅助更新所有视觉元素
        function updateVisuals(x0, y0) {
            // 1. 切片平面: 平面方程 x = x0, 范围 y ∈ [-1.8,1.8], z ∈ [-3.2, 3.2]
            if (slicePlaneMesh) scene.remove(slicePlaneMesh);
            // PlaneGeometry 默认是在XY平面 (法线Z)，我们需要一个垂直于X轴的平面，即法线为X轴方向。通过旋转实现：先绕Z旋转90度让法线从Z变到X
            const planeWidth = size;      // y 方向范围
            const planeHeight = 5.5;      // z 方向范围
            const planeGeometry = new THREE.PlaneGeometry(planeWidth, planeHeight);
            const planeMaterial = new THREE.MeshPhongMaterial({
                color: 0xffaa44,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.4,
                emissive: 0x442200
            });
            slicePlaneMesh = new THREE.Mesh(planeGeometry, planeMaterial);
            // 默认 PlaneGeometry 的法线是 (0,0,1)，需要旋转使其法线变为 (1,0,0)，即绕 Y 轴 +90° 或 -90°
            slicePlaneMesh.rotation.y = Math.PI / 2;   // 绕Y轴旋转90度，使法线朝向X轴
            slicePlaneMesh.position.set(x0, 0, 0);
            scene.add(slicePlaneMesh);
            
            // 2. 截线: 固定 x = x0, 参数 y 从 -1.8 到 1.8, z = x0^2 - y^2
            const pointsCount = 200;
            const pts = [];
            for (let i = 0; i <= pointsCount; i++) {
                const y = -size/2 + (i / pointsCount) * size;
                const z = x0*x0 - y*y;
                pts.push(new THREE.Vector3(x0, y, z));
            }
            const lineGeometry = new THREE.BufferGeometry().setFromPoints(pts);
            if (intersectionCurve) scene.remove(intersectionCurve);
            const lineMat = new THREE.LineBasicMaterial({ color: 0xff6699, linewidth: 3 }); // 粉色截线
            intersectionCurve = new THREE.Line(lineGeometry, lineMat);
            scene.add(intersectionCurve);
            
            // 3. 切线: 在点 (x0, y0, x0^2 - y0^2) 处, 偏导 ∂z/∂y = -2*y0
            const slope = -2 * y0;   // 因为 z = x0^2 - y^2, 对 y 求导: -2y
            const z0 = x0*x0 - y0*y0;
            // 切线参数方程 (沿 y 方向): 点 (x0, y, z_t(y))，范围 y0 - 1.2 到 y0 + 1.2，限制边界
            const tStart = Math.max(-size/2, y0 - 1.3);
            const tEnd = Math.min(size/2, y0 + 1.3);
            const tangentPts = [];
            const stepT = (tEnd - tStart) / 70;
            for (let y = tStart; y <= tEnd + 1e-6; y += stepT) {
                const zTangent = slope * (y - y0) + z0;
                tangentPts.push(new THREE.Vector3(x0, y, zTangent));
            }
            const tangentGeometry = new THREE.BufferGeometry().setFromPoints(tangentPts);
            if (tangentLineObj) scene.remove(tangentLineObj);
            const tangentMat = new THREE.LineBasicMaterial({ color: 0x33ff99, linewidth: 4 });
            tangentLineObj = new THREE.Line(tangentGeometry, tangentMat);
            scene.add(tangentLineObj);
            
            // 标记切点小球体
            if (markerPoint) scene.remove(markerPoint);
            const sphereGeo = new THREE.SphereGeometry(0.08, 24, 24);
            const sphereMat = new THREE.MeshStandardMaterial({ color: 0xffaa55, emissive: 0x442200 });
            markerPoint = new THREE.Mesh(sphereGeo, sphereMat);
            markerPoint.position.set(x0, y0, z0);
            scene.add(markerPoint);
            
            // 更新 HTML 显示
            document.getElementById('xSliceVal').innerText = x0.toFixed(3);
            document.getElementById('yPointSliderVal').innerText = y0.toFixed(3);
            document.getElementById('xValDisplay').innerText = x0.toFixed(3);
            document.getElementById('yPointDisplay').innerText = y0.toFixed(3);
            const slopeVal = (-2 * y0).toFixed(4);
            document.getElementById('slopeDisplay').innerHTML = slopeVal;
            document.getElementById('derivativeVal').innerHTML = slopeVal;
        }
        
        // UI 绑定
        const xSlider = document.getElementById('xSlice');
        const ySlider = document.getElementById('yPoint');
        
        function handleAllUpdates() {
            const x0 = parseFloat(xSlider.value);
            const y0 = parseFloat(ySlider.value);
            updateVisuals(x0, y0);
        }
        
        xSlider.addEventListener('input', handleAllUpdates);
        ySlider.addEventListener('input', handleAllUpdates);
        
        // --- 添加 CSS2D 文字标注，增强教学说明 ---
        function makeLabel(text, color, position) {
            const div = document.createElement('div');
            div.textContent = text;
            div.style.color = color;
            div.style.fontSize = '16px';
            div.style.fontWeight = 'bold';
            div.style.textShadow = '1px 1px 0px black';
            div.style.background = 'rgba(0,0,0,0.6)';
            div.style.padding = '2px 10px';
            div.style.borderRadius = '20px';
            div.style.borderLeft = `3px solid ${color}`;
            div.style.fontFamily = 'monospace';
            const label = new CSS2DObject(div);
            label.position.copy(position);
            scene.add(label);
        }
        
        makeLabel('曲面: z = x² − y²', '#88aaff', new THREE.Vector3(1.6, 2.0, 1.8));
        makeLabel('切片平面 (固定 x)', '#ffaa66', new THREE.Vector3(1.0, 1.5, -1.5));
        makeLabel('截线 (沿 y 方向)', '#ff6699', new THREE.Vector3(1.2, 0.9, 1.9));
        makeLabel('切线 ∂z/∂y = -2y₀', '#33ff99', new THREE.Vector3(1.5, -0.6, 2.0));
        makeLabel('切点', '#ffaa55', new THREE.Vector3(0.8, 0.6, 1.2));
        
        // 添加一些星空的装饰
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 1000;
        const starPos = [];
        for (let i = 0; i < starCount; i++) {
            starPos.push((Math.random() - 0.5) * 200);
            starPos.push((Math.random() - 0.5) * 100);
            starPos.push((Math.random() - 0.5) * 80 - 40);
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starPos), 3));
        const starMat = new THREE.PointsMaterial({ color: 0xaaccff, size: 0.06 });
        const stars = new THREE.Points(starGeometry, starMat);
        scene.add(stars);
        
        // 初始化默认值
        handleAllUpdates();
        
        // --- 动画循环 ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        animate();
        
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        console.log('✅ 3D 教学场景已启动 | 展示偏导数 ∂z/∂y 的几何意义 (固定 x，沿 y 方向切线)');
    </script>
</body>
</html>
